name: Build and Release

# 为了让上游同步后能触发这个工作流，我们让它监听 main 分支的 push 事件
on:
  push:
    branches:
      - main

# 授予创建 Release 和上传文件的权限
permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            output_name: MikuSB-win-x64
          - os: ubuntu-latest
            runtime: linux-x64
            output_name: MikuSB-linux-x64
      # 确保即使某个平台构建失败，也不影响其他平台
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 针对 Windows 和 Linux 的特殊设置 ---
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'  # 👈 请根据你的项目.NET版本修改

      # 如果 .NET 项目需要安装其他依赖（比如 NuGet），可以取消下面步骤的注释
      # - name: Restore dependencies
      #   run: dotnet restore

      # --- 核心构建步骤：使用 dotnet publish 生成独立可执行文件 ---
      - name: Publish for ${{ matrix.runtime }}
        # 将 MyApp.csproj 替换为你项目的主项目文件
        run: |
          dotnet publish MyApp.csproj `
            --configuration Release `
            --runtime ${{ matrix.runtime }} `
            --self-contained true `
            --output ./publish/${{ matrix.runtime }}
        shell: bash

      # --- 打包和校验步骤：生成最终的 .zip 和 .sha256 文件 ---
      - name: Package and checksum
        run: |
          mkdir -p release_assets
          # 打包 publish 目录下的所有内容
          pushd ./publish/${{ matrix.runtime }}
          zip -r ../../release_assets/${{ matrix.output_name }}.zip .
          popd
          # 计算 zip 文件的 SHA256 校验和
          sha256sum release_assets/${{ matrix.output_name }}.zip > release_assets/${{ matrix.output_name }}.zip.sha256
      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: release_assets/
