name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            output_name: MikuSB-win-x64
          - os: ubuntu-latest
            runtime: linux-x64
            output_name: MikuSB-linux-x64
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'   # 改成你的 .NET 版本

      # 🔍 自动查找项目文件或解决方案文件
      - name: Find project file
        id: findproj
        run: |
          # 优先查找 .csproj，如果没有就查找 .sln
          PROJ_FILE=$(ls *.csproj 2>/dev/null | head -n1)
          if [ -z "$PROJ_FILE" ]; then
            PROJ_FILE=$(ls *.sln 2>/dev/null | head -n1)
          fi
          if [ -z "$PROJ_FILE" ]; then
            echo "No .csproj or .sln file found!"
            exit 1
          fi
          echo "PROJECT_FILE=$PROJ_FILE" >> $GITHUB_OUTPUT
        shell: bash

      # 📦 执行 dotnet publish（正确语法）
      - name: Publish for ${{ matrix.runtime }}
        run: |
          dotnet publish "${{ steps.findproj.outputs.PROJECT_FILE }}" \
            --configuration Release \
            --runtime ${{ matrix.runtime }} \
            --self-contained true \
            --output "./publish/${{ matrix.runtime }}"
        shell: bash

      # 📦 打包和校验
      - name: Package and checksum
        run: |
          mkdir -p release_assets
          pushd "./publish/${{ matrix.runtime }}"
          zip -r "../../release_assets/${{ matrix.output_name }}.zip" .
          popd
          sha256sum "release_assets/${{ matrix.output_name }}.zip" > "release_assets/${{ matrix.output_name }}.zip.sha256"
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: release_assets/

  # 这里接着上一个 create-release 部分（和之前一样，保持不变）
  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate next version (timestamp based)
        id: version
        run: |
          DATE=$(date +'%Y.%m.%d')
          COUNT=$(git tag -l "v${DATE}-*" | wc -l)
          NEXT_COUNT=$((COUNT + 1))
          PADDED_COUNT=$(printf "%03d" $NEXT_COUNT)
          NEW_TAG="v${DATE}-${PADDED_COUNT}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}

      - name: Download all built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: "Auto Release ${{ steps.version.outputs.new_tag }}"
          body: |
            自动构建的 Release，基于上游最新代码。
            - 触发 commit: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/*/*.zip
            artifacts/*/*.sha256
